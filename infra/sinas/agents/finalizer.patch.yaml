#
# Finalizer agent model = anthropic/claude-opus-4.8.
#
# The Sinas finalize layer (only) runs on Opus 4.8 — it is covered by Sinas's
# own OpenRouter account (funded; paid Anthropic slugs return real output), NOT
# our API. The engine pipeline agents stay on DeepSeek flash.
#
# IMPORTANT — via-12 has NO agent PATCH/PUT (returns 405). Changing an agent's
# model therefore means DELETE + recreate. And a deleted agent name is
# soft-delete-locked: recreating under the SAME name 500s on the unique
# (namespace, name) constraint (the row is invisible to GET/LIST/DELETE but the
# INSERT still collides). So a model swap ships as a NEW agent name.
#
# Live state: the Opus finalizer exists as `pentest/finalizer-opus` (the old
# `pentest/finalizer` name is burned). The engine selects it at runtime via the
# worker env `SINAS_FINALIZER_AGENT` (apps/worker/src/job/sinas-finalization.ts;
# default `finalizer`). To swap models again: create `finalizer-<model>` with
# this model + the unchanged output_schema, then set SINAS_FINALIZER_AGENT to
# it on the shor-scan-worker job (no engine rebuild).
#
# Recreate body (NOT a PATCH): POST /api/v1/agents with the full agent minus the
# server-managed fields (id, user_id, created_at, updated_at, llm_provider_id,
# is_default) — those cause a 500. Keep: namespace, name, model, system_prompt,
# description, output_schema, input_schema, enabled_stores, system_tools
# (["store_search"]), max_tokens, temperature.

namespace: pentest
name: finalizer-opus
model: anthropic/claude-opus-4.8
engineEnv:
  SINAS_FINALIZER_AGENT: finalizer-opus
