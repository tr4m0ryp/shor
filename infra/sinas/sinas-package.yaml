apiVersion: sinas.co/v1
kind: SinasPackage
package:
  name: aegis-pentest-integration
  version: 0.1.0
  description: 'Two-way aegis<->Sinas backend: projects store, bearer engine connector, engine-minted
    trigger_scan / create_project functions.'
  author: Aegis Team
  url: https://github.com/keygraph/aegis
spec:
  variables:
  - name: ENGINE_BASE_URL
    type: text
    description: Public base URL of the hosted aegis-web control plane.
    required: true
  - name: ENGINE_TRIGGER_TOKEN
    type: secret
    description: Shared AEGIS_ENGINE_TRIGGER_TOKEN; Sinas->engine bearer credential the engine
      connector carries. Write-only; set once (T7).
    required: true
  manifests:
  - namespace: pentest
    name: aegis-pentest-integration
    description: Manifest for the aegis two-way integration backend.
    requiredResources:
    - type: store
      namespace: pentest
      name: projects
    - type: connector
      namespace: pentest
      name: engine
    - type: function
      namespace: pentest
      name: trigger_scan
    - type: function
      namespace: pentest
      name: create_project
    - type: agent
      namespace: pentest
      name: finalizer
    requiredPermissions: []
    optionalPermissions: []
    exposedNamespaces: {}
    storeDependencies: []
  stores:
  - namespace: pentest
    name: projects
    description: Mirror of aegis projects, keyed by engine-minted projectId. One state per
      project; value carries updatedAt for last-writer-wins idempotency.
  connectors:
  - namespace: pentest
    name: engine
    baseUrl: ${{ vars.ENGINE_BASE_URL }}
    auth:
      type: bearer
      secret: ${{ vars.ENGINE_TRIGGER_TOKEN }}
    timeoutSeconds: 60
    operations:
    - name: start_scan
      method: POST
      path: /external/scans
      parameters:
      - name: body
        in: body
        schema:
          type: object
          properties:
            projectId:
              type: string
            ref:
              type: string
            provider:
              type: string
          required:
          - projectId
    - name: create_project
      method: POST
      path: /external/projects
      parameters:
      - name: body
        in: body
        schema:
          type: object
          properties:
            name:
              type: string
            targetUrl:
              type: string
            mode:
              type: string
              enum:
              - blackbox
              - whitebox
            repoRef:
              type: string
          required:
          - name
          - targetUrl
          - mode
    - name: get_scan
      method: GET
      path: /external/scans/{scanId}
      parameters:
      - name: scanId
        in: path
        schema:
          type: string
    - name: list_repos
      method: GET
      path: /external/github/repos
      parameters: []
  functions:
  - namespace: pentest
    name: trigger_scan
    description: Start a scan on the engine, then mirror the engine-minted scanId into pentest/scans
      (T8). Deterministic, no LLM.
    sharedPool: true
    timeout: 30
    inputSchema:
      type: object
      properties:
        projectId:
          type: string
        ref:
          type: string
      required:
      - projectId
    outputSchema:
      type: object
      properties:
        scanId:
          type: string
        status:
          type: string
      required:
      - scanId
      - status
    code: "import datetime\nimport json\nimport urllib.request\n\n# --- Apply-time-verifiable\
      \ runtime paths -----------------------------------\n# Sinas runtime base URL reachable\
      \ from inside a function sandbox. The\n# package-author skill documents this host for\
      \ the preinstalled SDK.\nSINAS_RUNTIME_BASE = \"http://host.docker.internal:8000\"\n\
      \n# Connector-operation invocation path. The skill documents the query form\n# (\"/queries/{ns}/{name}/execute\"\
      ); the connector form is modelled on it.\n# FLAG (apply-time): confirm this exact path\
      \ against the via-12 runtime\n# OpenAPI (GET /openapi.json) before relying on it; if\
      \ it differs, change\n# ONLY this template \u2014 both functions import it.\nCONNECTOR_EXEC_PATH\
      \ = \"/connectors/{ns}/{name}/{op}/execute\"\n\n# Store state upsert. Proven on via-12\
      \ by apps/worker sinas-finalization.ts:\n# POST /stores/{ns}/{store}/states with {key,\
      \ value, tags}.\nSTORE_STATES_PATH = \"/stores/{ns}/{store}/states\"\n\nNAMESPACE =\
      \ \"pentest\"\nENGINE_CONNECTOR = \"engine\"\n\n\ndef _post(path, token, payload):\n\
      \    \"\"\"POST JSON to the Sinas runtime API with the execution access token.\"\"\"\
      \n    url = f\"{SINAS_RUNTIME_BASE}{path}\"\n    data = json.dumps(payload).encode(\"\
      utf-8\")\n    req = urllib.request.Request(url, data=data, method=\"POST\")\n    req.add_header(\"\
      Content-Type\", \"application/json\")\n    req.add_header(\"Authorization\", f\"Bearer\
      \ {token}\")\n    with urllib.request.urlopen(req, timeout=30) as resp:\n        body\
      \ = resp.read().decode(\"utf-8\")\n    return json.loads(body) if body else {}\n\n\n\
      def _call_engine(token, operation, op_input):\n    \"\"\"Invoke an `engine` connector\
      \ operation; return its parsed JSON result.\"\"\"\n    path = CONNECTOR_EXEC_PATH.format(ns=NAMESPACE,\
      \ name=ENGINE_CONNECTOR, op=operation)\n    # Connector operations declare a single\
      \ `body` parameter (in: body); the\n    # runtime accepts it under \"input\". Both keys\
      \ are sent for resilience to the\n    # exact runtime contract; the engine endpoint\
      \ reads the JSON body either way.\n    return _post(path, token, {\"input\": op_input,\
      \ \"body\": op_input})\n\n\ndef _record_state(token, store, key, value, tags=None):\n\
      \    \"\"\"Upsert one state into a pentest store, keyed by the engine-minted id.\"\"\
      \"\n    path = STORE_STATES_PATH.format(ns=NAMESPACE, store=store)\n    payload = {\"\
      key\": key, \"value\": value}\n    if tags:\n        payload[\"tags\"] = tags\n    return\
      \ _post(path, token, payload)\n\n\ndef handler(input_data, context):\n    \"\"\"Start\
      \ a scan on the engine, then mirror the engine-minted scan id.\n\n    input_data: {\
      \ \"projectId\": str, \"ref\": str (optional) }\n    returns:    { \"scanId\": str,\
      \ \"status\": str }\n    \"\"\"\n    project_id = input_data[\"projectId\"]\n    ref\
      \ = input_data.get(\"ref\")\n\n    # 1) Engine FIRST \u2014 POST /external/scans {projectId,\
      \ ref?} -> {scanId,status}\n    start_input = {\"projectId\": project_id}\n    if ref:\n\
      \        start_input[\"ref\"] = ref\n    started = _call_engine(context[\"access_token\"\
      ], \"start_scan\", start_input)\n\n    # The engine contract returns camelCase {scanId,status};\
      \ tolerate snake_case\n    # in case the connector passes the body through verbatim.\n\
      \    scan_id = started.get(\"scanId\") or started.get(\"scan_id\")\n    status = started.get(\"\
      status\") or \"queued\"\n    if not scan_id:\n        raise ValueError(f\"engine start_scan\
      \ returned no scan id: {started!r}\")\n\n    # 2) THEN record pentest/scans/{scan_id}\
      \ with the engine-minted id.\n    now = datetime.datetime.now(datetime.timezone.utc).isoformat()\n\
      \    _record_state(\n        context[\"access_token\"],\n        \"scans\",\n      \
      \  scan_id,\n        {\n            \"scanId\": scan_id,\n            \"projectId\"\
      : project_id,\n            \"ref\": ref,\n            \"status\": status,\n        \
      \    \"source\": \"sinas:trigger_scan\",\n            \"updatedAt\": now,\n        },\n\
      \        tags=[status],\n    )\n\n    return {\"scanId\": scan_id, \"status\": status}\n"
  - namespace: pentest
    name: create_project
    description: Create a project on the engine (black-box or white-box), then mirror the
      engine-minted projectId into pentest/projects (T8/T9). No LLM.
    sharedPool: true
    timeout: 30
    inputSchema:
      type: object
      properties:
        name:
          type: string
        targetUrl:
          type: string
        mode:
          type: string
          enum:
          - blackbox
          - whitebox
        repoRef:
          type: string
      required:
      - name
      - targetUrl
      - mode
    outputSchema:
      type: object
      properties:
        projectId:
          type: string
      required:
      - projectId
