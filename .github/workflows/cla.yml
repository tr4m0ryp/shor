name: CLA Assistant

# Requires a repo secret named PERSONAL_ACCESS_TOKEN (a fine-grained or classic
# PAT with `repo` scope) so the action can record signatures in the branch
# below. GITHUB_TOKEN alone cannot write to the signatures store. Add it at:
#   Settings → Secrets and variables → Actions → New repository secret.

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, synchronize, reopened]

permissions:
  actions: write
  contents: read       # 'write' if you store signatures in this repo
  pull-requests: write
  statuses: write

jobs:
  cla:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        if: >-
          (github.event.comment.body == 'recheck' ||
           github.event.comment.body == 'I have read the CLA Document and I hereby sign the CLA') ||
          github.event_name == 'pull_request_target'
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: 'signatures/cla.json'
          path-to-document: 'https://github.com/tr4m0ryp/shor/blob/main/CLA.md'
          branch: 'cla-signatures'
          allowlist: 'dependabot[bot],tr4m0ryp'
          custom-notsigned-prcomment: >-
            Thanks for your pull request! Before we can merge it, please read our
            [Contributor License Agreement](https://github.com/tr4m0ryp/shor/blob/main/CLA.md)
            and sign it by posting the exact comment below.
          custom-pr-sign-comment: 'I have read the CLA Document and I hereby sign the CLA'
          custom-allsigned-prcomment: 'All contributors have signed the CLA. ✍️'
